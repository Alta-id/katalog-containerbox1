<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTA.ID</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Segoe UI;background:#f5f7fa}

/* HEADER */
.header{
position:sticky;top:0;background:white;
padding:12px;text-align:center;
font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* HERO */
.hero{
background:#1976d2;color:white;
padding:30px;text-align:center;
}

/* SEARCH */
.search-box{padding:10px;background:white;}
.search-box input{
width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;
}

/* FILTER */
.category,.brand{
display:flex;gap:8px;padding:10px;background:white;
overflow:auto;
}
button.filter{
border:none;padding:8px 12px;border-radius:20px;
background:#e3f2fd;color:#1976d2;
}
.active{background:#1976d2;color:white;}

/* GRID */
.container{
display:grid;grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;
}
@media(max-width:480px){.container{grid-template-columns:1fr;}}

/* CARD */
.card{
background:white;border-radius:12px;padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.card img{
width:100%;aspect-ratio:1/1;object-fit:contain;
}
.price{color:#1976d2;font-weight:bold}

/* BUTTON */
.btn{width:100%;padding:8px;border:none;border-radius:8px;margin-top:5px;}
.cart{background:#e3f2fd;color:#1976d2;}
.buy{background:#1976d2;color:white}

/* CART */
#cartOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;
}
#cartModal{
position:fixed;right:-100%;top:0;width:80%;height:100%;
background:white;padding:15px;transition:0.3s;overflow:auto;
}

.qty-btn{
padding:5px 10px;margin:0 5px;
}

/* CHECKOUT */
.checkout-bar{
position:fixed;bottom:0;width:100%;background:white;padding:10px;
}
.checkout-btn{
width:100%;padding:10px;background:#1976d2;color:white;border:none;border-radius:8px;
}

/* TOAST */
#toast{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:#1976d2;color:white;padding:10px 20px;border-radius:8px;
opacity:0;transition:0.3s;
}
</style>
</head>

<body>

<div class="header">ALTA.ID</div>

<div class="hero">
<h2>Supplier Container Box</h2>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Cari..." onkeyup="update()">
</div>

<!-- CATEGORY -->
<div class="category">
<button class="filter active" onclick="setCat('all',this)">Semua</button>
<button class="filter" onclick="setCat('Jolly Box',this)">Jolly Box</button>
</div>

<!-- BRAND -->
<div class="brand">
<button class="filter active" onclick="setBrand('all',this)">Semua Brand</button>
<button class="filter" onclick="setBrand('Hanata',this)">Hanata</button>
</div>

<!-- PRODUK -->
<div class="container">

<div class="card product" data-cat="Jolly Box" data-brand="Hanata" data-name="jolly box hanata 643">
<img src="JBHNT643.png">
<div>Jolly Box Hanata 643</div>
<div class="price">Rp 50.000</div>
<button class="btn cart" onclick="addCart('Jolly Box Hanata 643')">+ Keranjang</button>
<button class="btn buy" onclick="order('Jolly Box Hanata 643')">Beli</button>
</div>

<div class="card product" data-cat="Jolly Box" data-brand="Hanata" data-name="jolly box hanata 642">
<img src="JBHNT642.png">
<div>Jolly Box Hanata 642</div>
<div class="price">Rp 41.000</div>
<button class="btn cart" onclick="addCart('Jolly Box Hanata 642')">+ Keranjang</button>
<button class="btn buy" onclick="order('Jolly Box Hanata 642')">Beli</button>
</div>

</div>

<!-- CART -->
<div id="cartOverlay" onclick="toggleCart()"></div>

<div id="cartModal">
<h3>Keranjang</h3>
<div id="cartItems"></div>
<button onclick="checkout()" class="checkout-btn">Checkout</button>
</div>

<div class="checkout-bar">
<button class="checkout-btn" onclick="toggleCart()">🛒 Lihat Keranjang</button>
</div>

<div id="toast"></div>

<script>
let cat='all',brand='all',cart=[];

/* FILTER */
function setCat(c,btn){
cat=c;
update();
setActive(btn,'.category .filter');
}

function setBrand(b,btn){
brand=b;
update();
setActive(btn,'.brand .filter');
}

function update(){
let keyword=document.getElementById("search").value.toLowerCase();

document.querySelectorAll('.product').forEach(p=>{
let name=p.dataset.name.toLowerCase();
let match=name.includes(keyword);
let cMatch=(cat==='all'||p.dataset.cat===cat);
let bMatch=(brand==='all'||p.dataset.brand===brand);

p.style.display=(match&&cMatch&&bMatch)?'block':'none';
});
}

function setActive(btn,selector){
document.querySelectorAll(selector).forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

/* CART */
function addCart(name){
let item=cart.find(i=>i.name===name);
if(item){item.qty++;}
else{cart.push({name:name,qty:1});}
renderCart();
showToast("✔ Ditambahkan");
}

function renderCart(){
let html="";
cart.forEach((item,i)=>{
html+=`
<div style="border-bottom:1px solid #ddd;padding:8px;">
${item.name}<br>
<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button class="qty-btn" onclick="changeQty(${i},1)">+</button>
<button onclick="removeItem(${i})">❌</button>
</div>`;
});
document.getElementById("cartItems").innerHTML=html;
}

function changeQty(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0){cart.splice(i,1);}
renderCart();
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

/* CART UI */
function toggleCart(){
let m=document.getElementById("cartModal");
let o=document.getElementById("cartOverlay");

if(m.style.right==="0px"){
m.style.right="-100%";
o.style.display="none";
}else{
m.style.right="0px";
o.style.display="block";
}
}

/* CHECKOUT */
function checkout(){
if(cart.length==0){
showToast("Keranjang kosong");
return;
}

let text="Pesanan:\n";
cart.forEach(i=>{
text+=`- ${i.name} x${i.qty}\n`;
});

window.open("https://wa.me/6285117385055?text="+encodeURIComponent(text));
}

/* ORDER */
function order(p){
window.open("https://wa.me/6285117385055?text="+encodeURIComponent("Pesan "+p));
}

/* TOAST */
function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,1500);
}

update();
</script>

</body>
</html>
